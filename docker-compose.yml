services:
  postgres:
    image: postgres:16-alpine
    container_name: devtrack_postgres
    environment:
      POSTGRES_DB: devtrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
