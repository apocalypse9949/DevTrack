server:
  port: 8082
  error:
    include-message: always

spring:
  application:
    name: project-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/devtrack_project_db
    username: postgres
    password: postgres_secure_pass
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
